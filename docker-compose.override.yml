version: '3.8'

services:
  # Additional client instances serving the same built assets
  client-3001:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    container_name: collab-code-client-3001
    restart: always
    ports:
      - "3001:3000"  # host:container
    environment:
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - server
    networks:
      - collab-network

  client-3002:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    container_name: collab-code-client-3002
    restart: always
    ports:
      - "3002:3000"  # host:container
    environment:
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - server
    networks:
      - collab-network

  # Additional server instance on port 5001
  server-5001:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: collab-code-server-5001
    restart: always
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/collabcode?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_secret_key
      NODE_ENV: production
    depends_on:
      - redis
      - mongodb
    networks:
      - collab-network

networks:
  collab-network:
    external: false
